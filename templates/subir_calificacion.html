<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subir Calificaciones - EST 16</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <span>EST 16</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">Panel Admin</a>
                    </li>
                    <li class="nav-item">
                        <a href="/logout" class="btn btn-logout">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-section" style="padding: 2rem 1rem;">
        <h1>Cargar Calificación</h1>
        <p>Registra una nueva calificación de estudiante</p>
    </div>

    <div class="container-main">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Registrar Calificación</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="form-group">
                                <label class="form-label">Seleccionar Alumno</label>
                                <select name="id_alumno" class="form-select" required>
                                    <option value="" disabled selected>-- Selecciona un alumno --</option>
                                    {% for alumno in alumnos %}
                                        <option value="{{ alumno.id_alumno }}">{{ alumno.nombre }} {{ alumno.apellido }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Asignatura</label>
                                <input type="text" name="materia" class="form-control" placeholder="Ej: Matemáticas, Historia..." required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Trimestre</label>
                                <select name="trimestre" class="form-select">
                                    <option value="1">1er Trimestre</option>
                                    <option value="2">2do Trimestre</option>
                                    <option value="3">3er Trimestre</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Calificación (0.0 - 10.0)</label>
                                <input type="number" step="0.1" name="calificacion" class="form-control" min="0" max="10" placeholder="Ej: 8.5" required>
                            </div>

                            <button type="submit" class="btn btn-warning w-100 py-2">
                                Guardar Calificación
                            </button>
                        </form>
                    </div>
                </div>

                <div class="text-center mt-3">
                    <a href="/admin" class="text-decoration-none">← Regresar al Panel</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 EST 16 - Gestión de Calificaciones</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
