<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - EST 16</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #1A5276 0%, #0E6251 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .recovery-card { max-width: 450px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 3rem; }
        .icon-circle { width: 70px; height: 70px; background: #f0f9ff; color: #0284c7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem; }
    </style>
</head>

<body>
    <div class="recovery-card text-center">
        <div class="icon-circle"><i class="fas fa-user-lock"></i></div>
        <h2 class="fw-bold text-dark">¿Olvidaste tu contraseña?</h2>
        <p class="text-muted mb-4">Ingresa tu CURP y te ayudaremos a recuperar el acceso a tu cuenta.</p>

        <form method="POST">
            <input type="hidden" name="action" value="enviar_codigo">
            <div class="mb-3 text-start">
                <label class="form-label small fw-bold">CURP Registrado</label>
                <input type="text" name="curp" class="form-control" placeholder="Ej: ABC123456" maxlength="18" required style="text-transform: uppercase;">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">
                <i class="fas fa-paper-plane me-2"></i>Enviar Código de Verificación
            </button>
            
            <div class="mt-3">
                <a href="/login" class="text-decoration-none small text-secondary">← Volver al inicio de sesión</a>
            </div>
        </form>

        <div class="mt-4 p-3 bg-light rounded small text-start">
            <i class="fas fa-envelope-open-text text-primary me-2"></i>
            Te enviaremos un código de 6 dígitos a tu correo electrónico registrado para validar que eres tú.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
