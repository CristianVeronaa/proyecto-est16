<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - EST 16</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #1A5276 0%, #0E6251 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .pass-card { max-width: 450px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 3rem; }
    </style>
</head>

<body>
    <div class="pass-card">
        <h2 class="fw-bold text-dark text-center">Nueva Contraseña</h2>
        <p class="text-muted mb-4 text-center">Crea una contraseña segura para tu cuenta.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'danger' else 'danger' }} small mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="action" value="restablecer_final">
            
            <div class="mb-3">
                <label class="form-label small fw-bold">Nueva Contraseña</label>
                <input type="password" name="nueva_pass" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">Confirmar Contraseña</label>
                <input type="password" name="pass_confirm" class="form-control" placeholder="Repita la contraseña" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                Actualizar y Entrar
            </button>
        </form>
    </div>
</body>

</html>
