<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código - EST 16</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #1A5276 0%, #0E6251 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .code-card { max-width: 450px; width: 100%; background: white; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); padding: 3rem; }
        .input-code { letter-spacing: 0.5rem; font-size: 2rem; text-align: center; font-weight: 700; border: 2px solid #e2e8f0; border-radius: 12px; }
    </style>
</head>

<body>
    <div class="code-card text-center">
        <h2 class="fw-bold text-dark">Ingresa el código</h2>
        <p class="text-muted mb-4">Hemos enviado un código de 6 dígitos para verificar tu identidad.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category if category != 'danger' else 'danger' }} small mb-3">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="hidden" name="action" value="verificar_codigo">
            <input type="hidden" name="curp" value="{{ curp }}">
            
            <div class="mb-4">
                <input type="text" name="codigo" class="form-control input-code" maxlength="6" placeholder="000000" required autocomplete="off">
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold mb-3">
                Verificar Código
            </button>
            
            <div class="mt-3">
                <a href="/olvide-password" class="text-decoration-none small text-secondary">Solicitar un nuevo código</a>
            </div>
        </form>
    </div>
</body>

</html>
