<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Alumno - EST 16</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand" href="/">
                <span>EST 16</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/admin">Panel Admin</a>
                    </li>
                    <li class="nav-item">
                        <a href="/logout" class="btn btn-logout">Cerrar Sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="hero-section" style="padding: 2rem 1rem;">
        <h1>Registrar Alumno</h1>
        <p>Agregar un nuevo estudiante al sistema</p>
    </div>

    <div class="container-main">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">Nuevo Registro de Estudiante</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            <div class="form-group">
                                <label class="form-label">Nombre(s) del Alumno</label>
                                <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">Apellidos</label>
                                <input type="text" name="apellido" class="form-control" placeholder="Ej: García López" required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">CURP del Padre/Tutor</label>
                                <input type="text" name="curp_tutor" class="form-control" placeholder="Debe estar registrado en el sistema" required>
                                <small class="form-text text-muted">El tutor debe estar registrado previamente</small>
                            </div>

                            <div class="row">
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label class="form-label">Grado</label>
                                        <select name="grado" class="form-select" required>
                                            <option value="1">1° - Primero</option>
                                            <option value="2">2° - Segundo</option>
                                            <option value="3">3° - Tercero</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label class="form-label">Grupo</label>
                                        <input type="text" name="grupo" class="form-control" placeholder="A, B..." required maxlength="1" style="text-transform: uppercase;">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-group">
                                        <label class="form-label">Turno</label>
                                        <select name="turno" class="form-select" required>
                                            <option value="Matutino">Matutino</option>
                                            <option value="Vespertino">Vespertino</option>
                                            <option value="Mixto">Mixto</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2">
                                Dar de Alta Alumno
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-3">
                    <a href="/admin" class="text-decoration-none">← Regresar al Panel</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2024 EST 16 - Registro de Alumnos</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
